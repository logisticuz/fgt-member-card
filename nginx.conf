# FGC Trollhättan — Digital Membership Card
# Reference nginx config for the Pi's shared nginx container.
# The Pi runs a dockerized nginx that proxies to all FGC services.
# This file is for documentation — the actual config lives in
# fgt-checkin-system/nginx.conf on the Pi.

server {
    listen 80;
    server_name membercard.fgctrollhattan.se;

    location / {
        proxy_pass http://127.0.0.1:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
